# Charteon - Modern, interactive charts for JasperReports, powered by Apache ECharts.
#
# Registers the Charteon chart component and its export handlers with the
# JasperReports extension framework.
net.sf.jasperreports.extension.registry.factory.charteon=tech.charteon.component.CharteonExtensionsRegistryFactory

# Allow Charteon classes to be deserialized when compiled reports (.jasper files)
# are loaded from streams.
net.sf.jasperreports.extension.registry.factory.deserialization.whitelist.charteon=net.sf.jasperreports.engine.util.StandardDeserializationClassWhitelistExtension
net.sf.jasperreports.deserialization.class.whitelist.charteon=tech.charteon.*
